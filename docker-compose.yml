services:
  # 1. Веб-сервер, который будет отдавать файлы
  web:
    image: nginx:alpine
    # Указываем, что контейнер будет доступен изнутри по порту 80
    # Внешний порт не указываем, так как Dokploy сам направит трафик через Traefik
    volumes:
      # Куда в контейнере лежат файлы сайта
      - ./my-site:/usr/share/nginx/html:ro
      # (Опционально) Если у вас сложная конфигурация nginx, можно подключить свой конфиг
      # - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Подключаемся к основной сети Dokploy, чтобы Traefik "увидел" контейнер
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # ВАЖНО: используем websecure entrypoint для HTTPS
      - "traefik.http.routers.my-portfolio.rule=Host(`ggyakovlev.ru`)" 
      - "traefik.http.routers.my-portfolio.entrypoints=websecure"
      - "traefik.http.routers.my-portfolio.tls.certresolver=letsencrypt"
      # Дополнительно: разрешаем HTTP для проверки (важно для Let's Encrypt)
      - "traefik.http.routers.my-portfolio-http.rule=Host(`ggyakovlev.ru`)" 
      - "traefik.http.routers.my-portfolio-http.entrypoints=web"
      - "traefik.http.routers.my-portfolio-http.middlewares=redirect-to-https@file"
      - "traefik.http.services.my-portfolio.loadbalancer.server.port=80"

# 2. (Опционально) Сервис PHP, если нужен
  php:
    image: php:8.2-fpm-alpine
    volumes:
      - ./my-site:/var/www/html
    networks:
      - dokploy-network
#    # Здесь не нужны labels, так как доступ к PHP идет только через nginx

# Объявляем сеть, которую мы используем. Важно: external: true
networks:
  dokploy-network:
    external: true